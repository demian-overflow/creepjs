# Nightglow fork — single server block.
#
# Replaces openresty's default.conf entirely so we can:
#   1. serve creepjs docs/ from /usr/share/nginx/html (where the Dockerfile
#      COPYs it) instead of openresty's default html dir;
#   2. attach permissive CORS on every response (creep.js's data/*.json XHRs
#      and the new consistency probes' cross-context fetches both need it);
#   3. expose a /echo endpoint that returns the request's headers as JSON,
#      consumed by tests/nightglow_consistency.html to diff JS-side
#      navigator state against the wire-level surface the server observes.

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # Static creepjs assets (incl. fork additions under /tests/nightglow_*)
    location / {
        try_files $uri $uri/ =404;
    }

    # Server-side echo. Returns:
    #   {
    #     "method": "GET",
    #     "uri": "/echo",
    #     "scheme": "http",
    #     "remote_addr": "...",
    #     "server_addr": "...",
    #     "headers": { "<name>": "<value>" or ["v1","v2"] for repeated, ... }
    #   }
    # `ngx.req.get_headers()` lower-cases header names. Repeated headers
    # arrive as arrays. cjson handles both as expected.
    location = /echo {
        default_type application/json;
        content_by_lua_block {
            local cjson = require "cjson"
            local out = {
                method      = ngx.var.request_method,
                uri         = ngx.var.request_uri,
                scheme      = ngx.var.scheme,
                remote_addr = ngx.var.remote_addr,
                server_addr = ngx.var.server_addr,
                headers     = ngx.req.get_headers(),
            }
            ngx.say(cjson.encode(out))
        }
    }
}
